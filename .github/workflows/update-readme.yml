name: Update profile SVG

on:
  schedule:
    - cron: "0 13 * * *" # daily, 6am Pacific
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - generate_profile.py
      - ascii_art.txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate SVG
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python generate_profile.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile_dark.svg cache/
          git diff --cached --quiet || git commit -m "chore: refresh profile stats"
          git push
